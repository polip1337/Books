<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Books</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --text: #e8eaed;
      --muted: #9aa0a6;
      --accent: #7cb8ff;
      --accent-hover: #a8d4ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Georgia", "Times New Roman", serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .wrap {
      max-width: 40rem;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 4rem;
    }
    h1 {
      font-size: 1.85rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin: 0 0 0.35rem;
    }
    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      margin: 0 0 2rem;
    }
    ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    li {
      margin: 0;
      border-bottom: 1px solid var(--surface);
    }
    li:last-child { border-bottom: none; }
    li a {
      display: block;
      padding: 1rem 0;
      color: var(--accent);
      text-decoration: none;
      font-size: 1.05rem;
    }
    li a:hover { color: var(--accent-hover); }
    li a span {
      display: block;
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: normal;
      margin-top: 0.25rem;
    }
    footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--surface);
      font-size: 0.85rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Books</h1>
    <p class="subtitle">Read online (GitHub Pages)</p>
    <ul>
      <li>
        <a href="the-i-of-the-dragon/index.html">The I of the Dragon<span>Chapters 1–32 · Markdown</span></a>
      </li>
      <li>
        <a href="starship-chronicles/index.html">Starship Chronicles<span>15 chapters · Markdown</span></a>
      </li>
      <li>
        <a href="dark-and-danger/index.html">Dark and danger<span>Chapters 1–42 · Plain text</span></a>
      </li>
      <li>
        <a href="tide-of-blades/index.html">Tide of Blades<span>Book 1 · 30 chapters · Plain text</span></a>
      </li>
    </ul>
    <footer>Static readers; chapters live in this repository.</footer>
  </div>
</body>
</html>
