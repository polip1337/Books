<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chapter — The I of the Dragon</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --text: #e8eaed;
      --muted: #9aa0a6;
      --accent: #7cb8ff;
      --accent-hover: #a8d4ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Georgia", "Times New Roman", serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
    }
    .wrap {
      max-width: 40rem;
      margin: 0 auto;
      padding: 1.5rem 1.25rem 4rem;
    }
    nav {
      margin-bottom: 1.75rem;
      font-size: 0.9rem;
    }
    nav a {
      color: var(--accent);
      text-decoration: none;
    }
    nav a:hover { color: var(--accent-hover); text-decoration: underline; }
    #content h1 {
      font-size: 1.65rem;
      font-weight: 600;
      margin-top: 0;
      margin-bottom: 1.25rem;
      line-height: 1.3;
    }
    #content h2 { font-size: 1.2rem; margin: 1.5rem 0 0.75rem; }
    #content p { margin: 0.85rem 0; }
    #content em { font-style: italic; }
    #content strong { font-weight: 600; }
    #err {
      color: #f28b82;
      padding: 1rem;
      background: var(--surface);
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <nav><a href="index.html">← Table of contents</a></nav>
    <article id="content"></article>
    <p id="err" hidden></p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var c = params.get("c") || "chapter 1.md";
      if (!/^chapter \d+\.md$/.test(c)) {
        document.getElementById("err").hidden = false;
        document.getElementById("err").textContent = "Invalid chapter.";
        return;
      }
      fetch(c)
        .then(function (r) {
          if (!r.ok) throw new Error("Could not load " + c + " (" + r.status + ")");
          return r.text();
        })
        .then(function (text) {
          document.getElementById("content").innerHTML = marked.parse(text);
          var h1 = document.querySelector("#content h1");
          if (h1) document.title = h1.textContent + " — The I of the Dragon";
        })
        .catch(function (e) {
          document.getElementById("err").hidden = false;
          document.getElementById("err").textContent = e.message;
        });
    })();
  </script>
</body>
</html>
