<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chapter — Tide of Blades</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --text: #e8eaed;
      --muted: #9aa0a6;
      --accent: #7cb8ff;
      --accent-hover: #a8d4ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Georgia", "Times New Roman", serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
    }
    .wrap { max-width: 40rem; margin: 0 auto; padding: 1.5rem 1.25rem 4rem; }
    nav { margin-bottom: 1.75rem; font-size: 0.9rem; }
    nav a { color: var(--accent); text-decoration: none; }
    nav a:hover { color: var(--accent-hover); text-decoration: underline; }
    #content {
      white-space: pre-wrap;
      font-size: 1rem;
      margin: 0;
    }
    #err { color: #f28b82; padding: 1rem; background: var(--surface); border-radius: 6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <nav><a href="index.html">← Chapters</a> · <a href="../index.html">All books</a></nav>
    <pre id="content"></pre>
    <p id="err" hidden></p>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var c = params.get("c") || "book1_ch01.txt";
      if (!/^book1_ch\d{2}\.txt$/.test(c)) {
        document.getElementById("err").hidden = false;
        document.getElementById("err").textContent = "Invalid chapter.";
        return;
      }
      fetch(c)
        .then(function (r) {
          if (!r.ok) throw new Error("Could not load " + c + " (" + r.status + ")");
          return r.text();
        })
        .then(function (text) {
          document.getElementById("content").textContent = text;
          var m = c.match(/^book1_ch(\d{2})\.txt$/);
          if (m) document.title = "Chapter " + String(Number(m[1])) + " — Tide of Blades";
        })
        .catch(function (e) {
          document.getElementById("err").hidden = false;
          document.getElementById("err").textContent = e.message;
        });
    })();
  </script>
</body>
</html>
